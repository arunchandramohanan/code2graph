# Optional: Neo4j for environments without a local install.
# The dev box currently runs Neo4j as a systemd service instead (same credentials).
services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/code2graph
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
volumes:
  neo4j_data:
